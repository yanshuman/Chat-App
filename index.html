<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #login-modal, #chat-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    #login-modal {
      display: none;
      flex-direction: column;
      padding: 40px;
      width: 340px;
      text-align: center;
    }

    #chat-container {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 600px;
      height: 90vh;
      margin: 20px;
    }

    .login-title {
      margin-bottom: 8px;
      color: #333;
      font-size: 1.5rem;
    }

    .login-hint {
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 20px;
    }

    .login-input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 1rem;
      text-align: center;
      outline: none;
    }

    .login-input:focus {
      border-color: #4a90d9;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: #4a90d9;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }

    .login-btn:hover { background: #357abd; }

    .chat-header {
      background: #4a90d9;
      color: white;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .chat-header h1 {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #current-user {
      font-weight: 500;
      font-size: 0.9rem;
    }

    .chat-header button {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .chat-header button:hover { background: rgba(255,255,255,0.3); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #fafafa;
    }

    .empty-state {
      text-align: center;
      color: #999;
      margin-top: 40px;
      font-size: 0.95rem;
    }

    .message {
      display: flex;
      max-width: 75%;
      animation: fadeIn 0.3s ease;
    }

    .message.own { align-self: flex-end; }
    .message.other { align-self: flex-start; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-bubble {
      padding: 10px 14px;
      border-radius: 14px;
      max-width: 100%;
      word-break: break-word;
    }

    .message.own .message-bubble {
      background: #2563EB;
      border-bottom-right-radius: 4px;
    }

    .message.own .message-sender {
      color: rgba(255,255,255,0.85);
    }

    .message.own .message-text {
      color: #fff;
    }

    .message.own .message-time {
      color: rgba(255,255,255,0.7);
    }

    .message.other .message-bubble {
      background: white;
      border: 1px solid #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .message-sender {
      font-size: 0.75rem;
      font-weight: 600;
      color: #4a90d9;
      margin-bottom: 4px;
    }

    .message-text {
      font-size: 16px;
      color: #333;
      line-height: 1.4;
    }

    .message-time {
      font-size: 0.7rem;
      color: #999;
      text-align: right;
      margin-top: 4px;
    }

    #input-area {
      display: flex;
      padding: 12px 16px;
      background: white;
      border-top: 1px solid #e0e0e0;
      gap: 10px;
      flex-shrink: 0;
    }

    #message-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 20px;
      outline: none;
      font-size: 0.95rem;
    }

    #message-input:focus { border-color: #4a90d9; }

    #send-btn {
      background: #4a90d9;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
    }

    #send-btn:hover { background: #357abd; }
  </style>
</head>
<body>

  <div id="login-modal">
    <h2 class="login-title">Join Chat</h2>
    <p class="login-hint">Open this page in two tabs with different names to start chatting.</p>
    <input type="text" id="username-input" class="login-input" placeholder="Enter your name" maxlength="20" autocomplete="off">
    <button id="login-btn" class="login-btn">Join</button>
  </div>

  <div id="chat-container">
    <div class="chat-header">
      <h1>💬 Chat App</h1>
      <div class="header-right">
        <span id="current-user"></span>
        <button id="change-user-btn">Change User</button>
      </div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <input type="text" id="message-input" placeholder="Type a message..." maxlength="500" autocomplete="off">
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script>
    const DB_NAME = 'ChatAppDB';
    const DB_VERSION = 1;
    const STORE_NAME = 'messages';
    const CHANNEL_NAME = 'chat-app-channel';

    let db = null;
    let username = localStorage.getItem('chat_username') || '';
    const channel = new BroadcastChannel(CHANNEL_NAME);

    // DOM elements
    const loginModal = document.getElementById('login-modal');
    const chatContainer = document.getElementById('chat-container');
    const usernameInput = document.getElementById('username-input');
    const loginBtn = document.getElementById('login-btn');
    const messagesContainer = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const currentUserSpan = document.getElementById('current-user');
    const changeUserBtn = document.getElementById('change-user-btn');

    function init() {
      initDB(() => {
        if (username) {
          showChat();
          loadMessages();
        } else {
          showLogin();
        }
      });
    }

    function initDB(callback) {
      const request = indexedDB.open(DB_NAME, DB_VERSION);
      request.onerror = () => {
        console.error('IndexedDB error:', request.error);
        alert('Failed to open database. Chat storage will not work.');
      };
      request.onsuccess = () => {
        db = request.result;
        if (callback) callback();
      };
      request.onupgradeneeded = (e) => {
        const database = e.target.result;
        if (!database.objectStoreNames.contains(STORE_NAME)) {
          database.createObjectStore(STORE_NAME, { keyPath: 'id' });
        }
      };
    }

    function showLogin() {
      loginModal.style.display = 'flex';
      chatContainer.style.display = 'none';
      usernameInput.focus();
    }

    function showChat() {
      loginModal.style.display = 'none';
      chatContainer.style.display = 'flex';
      currentUserSpan.textContent = username;
      messageInput.focus();
    }

    function generateId() {
      if (typeof crypto !== 'undefined' && crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function createMessageElement(msg) {
      const div = document.createElement('div');
      div.className = 'message ' + (msg.sender === username ? 'own' : 'other');
      const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      div.innerHTML = `
        <div class="message-bubble">
          <div class="message-sender">${escapeHtml(msg.sender)}</div>
          <div class="message-text">${escapeHtml(msg.text)}</div>
          <div class="message-time">${time}</div>
        </div>
      `;
      return div;
    }

    function renderMessage(msg) {
      messagesContainer.appendChild(createMessageElement(msg));
      scrollToBottom();
    }

    function scrollToBottom() {
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function loadMessages() {
      if (!db) return;
      const tx = db.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const request = store.getAll();
      request.onsuccess = () => {
        const messages = request.result;
        messages.sort((a, b) => a.timestamp - b.timestamp);
        messagesContainer.innerHTML = '';
        if (messages.length === 0) {
          messagesContainer.innerHTML = '<div class="empty-state">No messages yet. Start chatting!</div>';
        } else {
          const fragment = document.createDocumentFragment();
          messages.forEach(msg => fragment.appendChild(createMessageElement(msg)));
          messagesContainer.appendChild(fragment);
        }
        scrollToBottom();
      };
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !db) return;

      const msg = {
        id: generateId(),
        sender: username,
        text: text,
        timestamp: Date.now()
      };

      const tx = db.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      store.put(msg);

      tx.oncomplete = () => {
        messageInput.value = '';
        // Remove empty state if present
        const empty = messagesContainer.querySelector('.empty-state');
        if (empty) empty.remove();
        renderMessage(msg);
        channel.postMessage(msg);
      };

      tx.onerror = () => console.error('Failed to save message');
    }

    // Receive messages from other tabs
    channel.onmessage = (event) => {
      const msg = event.data;
      if (!msg || !msg.id || msg.sender === username) return;

      // Save to DB (idempotent)
      if (db) {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.put(msg);
      }

      // Remove empty state if present
      const empty = messagesContainer.querySelector('.empty-state');
      if (empty) empty.remove();

      renderMessage(msg);
    };

    // Event listeners
    loginBtn.addEventListener('click', () => {
      const name = usernameInput.value.trim();
      if (name) {
        username = name;
        localStorage.setItem('chat_username', username);
        showChat();
        loadMessages();
      }
    });

    usernameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });

    sendBtn.addEventListener('click', sendMessage);

    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    changeUserBtn.addEventListener('click', () => {
      localStorage.removeItem('chat_username');
      location.reload();
    });

    init();
  </script>
</body>
</html>
